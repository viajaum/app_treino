<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meu Treino">
<title>Meu Treino</title>
<link rel="manifest" href="manifest.json">

<style>
* {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    user-select: none;
}
body {
    background: #0a0f1e;
    color: white;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    /* IMPEDE PULL-TO-REFRESH */
    overscroll-behavior-y: none;
    position: fixed;
    width: 100%;
    height: 100%;
    overflow-y: auto;
}
@media (display-mode: standalone) {
    body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
    }
}
.container {
    max-width: 900px;
    margin: 0 auto;
    height: 100%;
    display: flex;
    flex-direction: column;
}

/* PARTE FIXA NO TOPO - SEMPRE VISÍVEL */
.fixed-header {
    position: sticky;
    top: 0;
    background: #0a0f1e;
    z-index: 100;
    padding: 16px 16px 8px 16px;
}
.card {
    background: #141b2b;
    border-radius: 1.5rem;
    padding: 1.2rem;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
.timer-display {
    font-size: 70px;
    text-align: center;
    font-family: monospace;
    font-weight: bold;
    color: #facc15;
    margin: 10px 0;
    letter-spacing: 4px;
}
.total-timer {
    text-align: right;
    font-size: 14px;
    color: #60a5fa;
    margin-bottom: 5px;
    font-family: monospace;
}
.exercise-name {
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    margin-top: 5px;
}
.stage-category {
    text-align: center;
    font-size: 13px;
    color: #94a3b8;
    margin-top: 5px;
}
.round-info {
    text-align: center;
    font-size: 13px;
    color: #60a5fa;
    margin-top: 5px;
}
.next-exercise {
    text-align: center;
    font-size: 14px;
    color: #facc15;
    margin-top: 8px;
    background: #1e293b;
    display: inline-block;
    padding: 4px 12px;
    border-radius: 40px;
    width: auto;
    margin-left: auto;
    margin-right: auto;
}
.progress {
    height: 10px;
    background: #1e293b;
    border-radius: 20px;
    overflow: hidden;
    margin: 12px 0;
}
.progress-fill {
    height: 100%;
    background: #3b82f6;
    transition: width 0.3s linear;
}
.controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
}
button {
    border: none;
    border-radius: 60px;
    padding: 12px 24px;
    cursor: pointer;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    transition: transform 0.1s, opacity 0.2s;
}
button:active {
    transform: scale(0.96);
}
button.disabled-btn, button:disabled {
    opacity: 0.4;
    pointer-events: none !important;
}
.btn-primary { background: #2563eb; }
.btn-danger { background: #dc2626; }
.btn-success { background: #10b981; }

.status {
    margin-top: 10px;
    text-align: center;
    color: #94a3b8;
    font-size: 12px;
}

/* PARTE ROLÁVEL - LISTA E IMPORTAR */
.scrollable-content {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 16px 16px;
}
.exercise-list-card {
    background: #0f172a;
    border-radius: 1rem;
    padding: 12px;
    margin-bottom: 15px;
}
.exercise-list-card h3 {
    margin: 0 0 12px 0;
    font-size: 16px;
    color: #60a5fa;
    display: flex;
    align-items: center;
    gap: 6px;
}
.exercise-list-container {
    max-height: none;
    overflow-y: visible;
}
.exercise-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    border-bottom: 1px solid #1e293b;
    font-size: 13px;
}
.exercise-list-item.current {
    background: #1e3a5f;
    border-radius: 12px;
    border-left: 3px solid #facc15;
}
.exercise-list-item .ex-name { flex: 2; color: #e2e8f0; }
.exercise-list-item .ex-time { color: #facc15; font-family: monospace; font-weight: bold; }
.exercise-list-item .ex-status { width: 24px; text-align: center; }
.exercise-list-item.completed { opacity: 0.5; background: #0f1422; }
.exercise-list-item.completed .ex-name { text-decoration: line-through; }

.import-json {
    background: #0f172a;
    border-radius: 1rem;
    padding: 15px;
    margin-bottom: 15px;
    text-align: center;
    border: 1px solid #2563eb;
}
.import-json.disabled {
    opacity: 0.4;
    pointer-events: none;
}
.file-info {
    margin-top: 8px;
    font-size: 11px;
    color: #64748b;
}

/* TELA DE PADRÃO */
.pattern-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a0f1e;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(12px);
}
.pattern-header {
    text-align: center;
    margin-bottom: 40px;
}
.pattern-header h2 {
    font-size: 28px;
    margin-bottom: 8px;
    color: #facc15;
}
.pattern-header p {
    font-size: 14px;
    color: #94a3b8;
}
.pattern-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 260px;
    margin: 20px auto;
}
.pattern-dot {
    aspect-ratio: 1;
    background: #1e293b;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.1s;
    border: 2px solid #334155;
}
.pattern-dot.selected {
    background: #3b82f6;
    border-color: #60a5fa;
    transform: scale(1.05);
}
.pattern-message {
    text-align: center;
    margin-top: 30px;
    font-size: 16px;
    color: #ef4444;
    min-height: 50px;
}
.pattern-reset {
    background: #334155;
    margin-top: 20px;
    padding: 10px 24px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
}

.countdown {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.9);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 10001;
}
.countdown-number {
    font-size: 140px;
    font-weight: bold;
    color: #facc15;
}
.countdown-text {
    font-size: 24px;
}
</style>
</head>
<body>

<div class="container">
    <!-- PARTE FIXA NO TOPO -->
    <div class="fixed-header">
        <div class="card">
            <div class="total-timer" id="totalTimerDisplay">⏱️ TOTAL: 00:00</div>
            <div class="exercise-name" id="exerciseName">Carregue um treino</div>
            <div class="stage-category" id="stageCategory"></div>
            <div class="round-info" id="roundInfo"></div>
            <div class="next-exercise" id="nextExercise"></div>
            <div class="timer-display" id="timerDisplay">00:00</div>
            <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
            <div class="controls">
                <button class="btn-primary" id="startBtn">▶ INICIAR</button>
                <button id="pauseBtn" class="btn-danger">⏸ PAUSAR</button>
                <button class="btn-danger" id="resetBtn">⟳ RESETAR</button>
            </div>
            <div class="status" id="statusMessage">📁 Clique em SELECIONAR JSON abaixo</div>
        </div>
    </div>

    <!-- PARTE ROLÁVEL -->
    <div class="scrollable-content">
        <div class="exercise-list-card" id="exerciseListCard" style="display:none;">
            <h3>📋 EXERCÍCIOS</h3>
            <div class="exercise-list-container" id="exerciseListContainer"></div>
        </div>

        <div class="import-json" id="importJsonDiv">
            <input type="file" id="jsonFileInput" accept=".json" style="display:none;">
            <button id="importJsonBtn" class="btn-primary">📂 SELECIONAR JSON</button>
            <div class="file-info">Exemplo: { "aquecimento": [{"nome":"Polichinelo","segundos":60}] }</div>
        </div>
    </div>
</div>

<script>
// ==============================
// DESABILITAR PULL-TO-REFRESH
// ==============================
let startY = 0;
let isScrolling = false;

document.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
}, { passive: false });

document.addEventListener('touchmove', function(e) {
    const currentY = e.touches[0].clientY;
    const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    
    // Se estiver no topo e tentar puxar para baixo, previne
    if (currentY > startY && scrollTop === 0) {
        e.preventDefault();
        return false;
    }
}, { passive: false });

// ==============================
// PADRÃO (1-2-3-6-9)
// ==============================
const DEFAULT_PATTERN = [0, 1, 2, 5, 8];
let selectedPoints = [];
let isPatternActive = false;

// Variáveis do treino
let aquecimento = [], treino = [], desaquecimento = [];
let treinoRounds = 1, restBetweenRounds = 0, restAquecimentoToTreino = 5, restTreinoToDesaquecimento = 5;
let fullWorkflow = [], currentStepIndex = 0, timeLeft = 0, timerInterval = null, isRunning = false;
let totalTimeSeconds = 0, totalTimeLeft = 0, hasAnnouncedNext = false, treinoCarregado = false;
let audioActivated = false;

// DOM
const timerDisplay = document.getElementById('timerDisplay');
const totalTimerDisplay = document.getElementById('totalTimerDisplay');
const exerciseName = document.getElementById('exerciseName');
const stageCategory = document.getElementById('stageCategory');
const roundInfo = document.getElementById('roundInfo');
const nextExerciseSpan = document.getElementById('nextExercise');
const progressFill = document.getElementById('progressFill');
const statusMessage = document.getElementById('statusMessage');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const importJsonBtn = document.getElementById('importJsonBtn');
const jsonFileInput = document.getElementById('jsonFileInput');
const exerciseListCard = document.getElementById('exerciseListCard');
const exerciseListContainer = document.getElementById('exerciseListContainer');
const importJsonDiv = document.getElementById('importJsonDiv');

// ========== CONTROLE DE BOTÕES ==========
function disableAllExceptPause() {
    startBtn.disabled = true;
    resetBtn.disabled = true;
    importJsonBtn.disabled = true;
    startBtn.classList.add('disabled-btn');
    resetBtn.classList.add('disabled-btn');
    importJsonBtn.classList.add('disabled-btn');
    importJsonDiv.classList.add('disabled');
    exerciseListCard.classList.add('disabled');
    pauseBtn.disabled = false;
    pauseBtn.classList.remove('disabled-btn');
}

function enableAllButtons() {
    startBtn.disabled = false;
    pauseBtn.disabled = false;
    resetBtn.disabled = false;
    importJsonBtn.disabled = false;
    startBtn.classList.remove('disabled-btn');
    pauseBtn.classList.remove('disabled-btn');
    resetBtn.classList.remove('disabled-btn');
    importJsonBtn.classList.remove('disabled-btn');
    importJsonDiv.classList.remove('disabled');
    exerciseListCard.classList.remove('disabled');
}

// ========== TELA DE PADRÃO ==========
function showPatternModal(onSuccess) {
    if (isPatternActive) return;
    isPatternActive = true;
    selectedPoints = [];
    
    const wasRunning = isRunning;
    if (wasRunning) {
        stopTimer();
    }
    
    const overlay = document.createElement('div');
    overlay.className = 'pattern-overlay';
    overlay.id = 'patternOverlay';
    overlay.innerHTML = `
        <div class="pattern-header">
            <h2>🔒 CONFIRMAR PAUSA</h2>
            <p>Desenhe o padrão para pausar</p>
        </div>
        <div class="pattern-container" id="patternContainer"></div>
        <div class="pattern-message" id="patternMessage"></div>
        <button class="pattern-reset" id="patternResetBtn">LIMPAR PADRÃO</button>
    `;
    document.body.appendChild(overlay);
    
    const container = document.getElementById('patternContainer');
    for (let i = 0; i < 9; i++) {
        const dot = document.createElement('div');
        dot.className = 'pattern-dot';
        dot.dataset.index = i;
        dot.addEventListener('click', (e) => {
            const idx = parseInt(dot.dataset.index);
            if (!selectedPoints.includes(idx)) {
                selectedPoints.push(idx);
                updatePatternDots();
                checkPattern(onSuccess, wasRunning);
            }
        });
        container.appendChild(dot);
    }
    
    document.getElementById('patternResetBtn').addEventListener('click', () => {
        selectedPoints = [];
        updatePatternDots();
        document.getElementById('patternMessage').innerHTML = '';
    });
}

function updatePatternDots() {
    const dots = document.querySelectorAll('.pattern-dot');
    dots.forEach((dot, idx) => {
        dot.classList.remove('selected');
        if (selectedPoints.includes(idx)) dot.classList.add('selected');
    });
}

function checkPattern(onSuccess, wasRunning) {
    if (selectedPoints.length === DEFAULT_PATTERN.length) {
        let isMatch = true;
        for (let i = 0; i < DEFAULT_PATTERN.length; i++) {
            if (selectedPoints[i] !== DEFAULT_PATTERN[i]) { isMatch = false; break; }
        }
        if (isMatch) {
            document.getElementById('patternMessage').innerHTML = '<span style="color:#10b981;">✅ Padrão correto! Pausando...</span>';
            setTimeout(() => {
                const overlay = document.getElementById('patternOverlay');
                if (overlay) overlay.remove();
                isPatternActive = false;
                onSuccess(wasRunning);
            }, 500);
        } else {
            document.getElementById('patternMessage').innerHTML = '<span style="color:#ef4444;">❌ Padrão incorreto! Tente novamente.</span>';
            selectedPoints = [];
            updatePatternDots();
        }
    }
}

// ========== FUNÇÕES DO TREINO ==========
function formatTime(seconds) {
    const mins = Math.floor(Math.abs(seconds) / 60);
    const secs = Math.abs(seconds) % 60;
    return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
}

function formatTimeToText(seconds) {
    if (seconds < 60) return `${seconds} segundos`;
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    if (secs === 0) return mins === 1 ? `${mins} minuto` : `${mins} minutos`;
    return `${mins} minuto${mins > 1 ? 's' : ''} e ${secs} segundo${secs > 1 ? 's' : ''}`;
}

function speak(text) {
    if (!audioActivated || !text) return;
    try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'pt-BR';
        utterance.rate = 1;
        window.speechSynthesis.speak(utterance);
    } catch(e) { }
}

function beep(freq=900, duration=.15) {
    if (!audioActivated) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
        osc.stop(ctx.currentTime + duration);
        ctx.resume();
    } catch(e) { }
}

function activateAudio() {
    if (audioActivated) return;
    audioActivated = true;
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    ctx.resume();
}
document.body.addEventListener('click', activateAudio, { once: true });

function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    isRunning = false;
}

function renderExerciseList() {
    if (!fullWorkflow.length) { exerciseListCard.style.display = 'none'; return; }
    exerciseListCard.style.display = 'block';
    exerciseListContainer.innerHTML = '';
    fullWorkflow.forEach((step, index) => {
        const item = document.createElement('div');
        item.className = 'exercise-list-item';
        if (index === currentStepIndex) item.classList.add('current');
        if (index < currentStepIndex) item.classList.add('completed');
        const statusSpan = document.createElement('span');
        statusSpan.className = 'ex-status';
        if (index < currentStepIndex) statusSpan.textContent = '✅';
        else if (index === currentStepIndex) statusSpan.textContent = '▶';
        else statusSpan.textContent = '○';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'ex-name';
        let displayName = step.name;
        if (step.etapa === 'treino' && step.round) displayName = `[${step.round}] ${step.name}`;
        else if (step.etapa === 'aquecimento') displayName = `🔥 ${step.name}`;
        else if (step.etapa === 'desaquecimento') displayName = `🧘 ${step.name}`;
        else if (step.type === 'rest') displayName = `⏸️ ${step.name}`;
        nameSpan.textContent = displayName;
        const timeSpan = document.createElement('span');
        timeSpan.className = 'ex-time';
        timeSpan.textContent = formatTime(step.seconds);
        item.appendChild(statusSpan);
        item.appendChild(nameSpan);
        item.appendChild(timeSpan);
        exerciseListContainer.appendChild(item);
    });
}

function updateUI() {
    if (!fullWorkflow.length || currentStepIndex >= fullWorkflow.length) {
        timerDisplay.textContent = formatTime(0);
        exerciseName.textContent = treinoCarregado ? "🏆 FIM!" : "Carregue um treino";
        stageCategory.textContent = "";
        roundInfo.textContent = "";
        nextExerciseSpan.textContent = "";
        progressFill.style.width = "0%";
        renderExerciseList();
        return;
    }
    const step = fullWorkflow[currentStepIndex];
    timerDisplay.textContent = formatTime(timeLeft);
    const totalTime = step.seconds;
    progressFill.style.width = `${(timeLeft / totalTime) * 100}%`;
    exerciseName.textContent = step.name;
    totalTimerDisplay.textContent = `⏱️ TOTAL: ${formatTime(totalTimeLeft)}`;
    
    if (currentStepIndex + 1 < fullWorkflow.length) {
        const nextStep = fullWorkflow[currentStepIndex + 1];
        const timeText = formatTimeToText(nextStep.seconds);
        if (nextStep.type === 'rest') nextExerciseSpan.textContent = `⏩ Próximo: DESCANSO, ${timeText}`;
        else nextExerciseSpan.textContent = `⏩ Próximo: ${nextStep.name}, ${timeText}`;
    } else { nextExerciseSpan.textContent = `⏩ Último!`; }
    
    renderExerciseList();
    if (step.etapa === 'aquecimento') { stageCategory.textContent = '🔥 AQUECIMENTO'; roundInfo.textContent = ''; }
    else if (step.etapa === 'treino') { stageCategory.textContent = '💪 TREINO'; roundInfo.textContent = `Rodada ${step.round}/${treinoRounds}`; }
    else if (step.etapa === 'desaquecimento') { stageCategory.textContent = '🧘 DESAQUECIMENTO'; roundInfo.textContent = ''; }
    else if (step.type === 'rest') { stageCategory.textContent = '⏸️ DESCANSO'; roundInfo.textContent = ''; }
}

function announceNextIfNeeded() {
    if (timeLeft === 10 && currentStepIndex + 1 < fullWorkflow.length && !hasAnnouncedNext) {
        hasAnnouncedNext = true;
        const nextStep = fullWorkflow[currentStepIndex + 1];
        if (nextStep) {
            const timeText = formatTimeToText(nextStep.seconds);
            let msg = nextStep.type === 'rest' ? `Próximo: descanso, ${timeText}` : `Próximo: ${nextStep.name}, ${timeText}`;
            speak(msg);
            statusMessage.innerHTML = `🔊 ${msg}`;
        }
    }
}

function showCountdown(callback) {
    const overlay = document.createElement('div');
    overlay.className = 'countdown';
    overlay.innerHTML = `<div class="countdown-number">3</div><div class="countdown-text"></div>`;
    document.body.appendChild(overlay);
    let count = 3;
    function update() {
        const numberDiv = overlay.querySelector('.countdown-number');
        numberDiv.textContent = count;
        if (count > 0) beep();
        else { numberDiv.textContent = 'VAI!'; beep(1200, 0.4); }
    }
    update();
    const interval = setInterval(() => {
        count--;
        if (count >= 0) update();
        else { clearInterval(interval); overlay.remove(); callback(); }
    }, 1000);
}

function startActualTimer() {
    if (timerInterval) stopTimer();
    if (currentStepIndex >= fullWorkflow.length) return;
    timeLeft = fullWorkflow[currentStepIndex].seconds;
    hasAnnouncedNext = false;
    updateUI();
    isRunning = true;
    disableAllExceptPause();
    
    timerInterval = setInterval(() => {
        if (!isRunning) return;
        if (timeLeft > 0) {
            timeLeft--;
            totalTimeLeft--;
            updateUI();
            if (timeLeft === 10) announceNextIfNeeded();
            if (timeLeft === 3) beep();
            if (timeLeft === 2) beep();
            if (timeLeft === 1) beep();
        }
        if (timeLeft === 0 && currentStepIndex < fullWorkflow.length) {
            stopTimer();
            isRunning = false;
            if (currentStepIndex + 1 < fullWorkflow.length) {
                currentStepIndex++;
                startActualTimer();
            } else {
                currentStepIndex++;
                updateUI();
                speak("Treino finalizado!");
                statusMessage.innerHTML = "🏆 TREINO FINALIZADO!";
                beep(1200, 0.5);
                enableAllButtons();
            }
        }
    }, 1000);
}

function startFirstExercise() {
    if (currentStepIndex >= fullWorkflow.length) return;
    updateUI();
    showCountdown(() => { startActualTimer(); });
}

function startTreino() {
    if (!treinoCarregado) { statusMessage.innerHTML = "❌ Carregue um JSON primeiro!"; return; }
    if (currentStepIndex >= fullWorkflow.length) resetTreino();
    if (!isRunning && currentStepIndex < fullWorkflow.length) startFirstExercise();
}

function pauseTreino() {
    if (!isRunning) {
        statusMessage.innerHTML = "Nenhum treino em andamento para pausar.";
        return;
    }
    showPatternModal((wasRunning) => {
        stopTimer();
        isRunning = false;
        enableAllButtons();
        window.speechSynthesis.cancel();
        statusMessage.innerHTML = "⏸ Treino pausado";
        speak("Treino pausado");
    });
}

function resetTreino() {
    if (!treinoCarregado) return;
    if (isRunning) {
        if (confirm("RESETAR O TREINO?")) {
            stopTimer();
            isRunning = false;
            currentStepIndex = 0;
            hasAnnouncedNext = false;
            if (fullWorkflow.length) timeLeft = fullWorkflow[0].seconds;
            totalTimeLeft = totalTimeSeconds;
            updateUI();
            statusMessage.innerHTML = "🔄 Resetado";
            enableAllButtons();
            speak("Treino resetado");
        }
    } else {
        stopTimer();
        isRunning = false;
        currentStepIndex = 0;
        hasAnnouncedNext = false;
        if (fullWorkflow.length) timeLeft = fullWorkflow[0].seconds;
        totalTimeLeft = totalTimeSeconds;
        updateUI();
        statusMessage.innerHTML = "🔄 Resetado";
        enableAllButtons();
        speak("Treino resetado");
    }
}

function generateWorkflow() {
    const workflow = [];
    for (let i=0; i<aquecimento.length; i++) workflow.push({ type: 'exercise', etapa: 'aquecimento', name: aquecimento[i].name, seconds: aquecimento[i].seconds, round: null, idx: i });
    if (aquecimento.length && restAquecimentoToTreino) workflow.push({ type: 'rest', etapa: 'transicao', name: '⏸️ Transição', seconds: restAquecimentoToTreino });
    for (let round=1; round<=treinoRounds; round++) {
        for (let i=0; i<treino.length; i++) workflow.push({ type: 'exercise', etapa: 'treino', name: treino[i].name, seconds: treino[i].seconds, round: round, idx: i });
        if (round < treinoRounds && restBetweenRounds) workflow.push({ type: 'rest', etapa: 'descanso_entre_series', name: '⏸️ Descanso', seconds: restBetweenRounds, round: round });
    }
    if (treino.length && restTreinoToDesaquecimento) workflow.push({ type: 'rest', etapa: 'transicao', name: '⏸️ Transição', seconds: restTreinoToDesaquecimento });
    for (let i=0; i<desaquecimento.length; i++) workflow.push({ type: 'exercise', etapa: 'desaquecimento', name: desaquecimento[i].name, seconds: desaquecimento[i].seconds, round: null, idx: i });
    return workflow;
}

function rebuildWorkflow() {
    fullWorkflow = generateWorkflow();
    totalTimeSeconds = fullWorkflow.reduce((s, step) => s + step.seconds, 0);
    totalTimeLeft = totalTimeSeconds;
    if (currentStepIndex >= fullWorkflow.length) currentStepIndex = fullWorkflow.length;
    if (fullWorkflow.length && currentStepIndex < fullWorkflow.length && !timeLeft) timeLeft = fullWorkflow[currentStepIndex].seconds;
    updateUI();
}

function importFromJSON(jsonData) {
    try {
        const data = JSON.parse(jsonData);
        aquecimento = (data.aquecimento || []).map(ex => ({ name: ex.nome || ex.name, seconds: ex.segundos || ex.seconds }));
        treino = (data.treino || []).map(ex => ({ name: ex.nome || ex.name, seconds: ex.segundos || ex.seconds }));
        desaquecimento = (data.desaquecimento || []).map(ex => ({ name: ex.nome || ex.name, seconds: ex.segundos || ex.seconds }));
        if (data.config) {
            treinoRounds = data.config.rodadas || 1;
            restBetweenRounds = data.config.descanso_entre_rodadas || 0;
            restAquecimentoToTreino = data.config.transicao_aquecimento_treino || 5;
            restTreinoToDesaquecimento = data.config.transicao_treino_desaquecimento || 5;
        }
        treinoCarregado = true;
        rebuildWorkflow();
        currentStepIndex = 0;
        if (fullWorkflow.length) timeLeft = fullWorkflow[0].seconds;
        totalTimeLeft = totalTimeSeconds;
        updateUI();
        statusMessage.innerHTML = `✅ "${data.nome || 'Treino'}" carregado! Clique INICIAR.`;
        speak("Treino carregado");
    } catch(e) { alert("Erro ao importar JSON: " + e.message); }
}

// ========== EVENTOS ==========
startBtn.onclick = startTreino;
pauseBtn.onclick = pauseTreino;
resetBtn.onclick = resetTreino;
importJsonBtn.onclick = () => { jsonFileInput.click(); };
jsonFileInput.onchange = (e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onload = ev => importFromJSON(ev.target.result); reader.readAsText(file); } };
</script>
