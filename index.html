<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino Atualizado</title>

<style>
*{
    box-sizing:border-box;
    font-family:system-ui;
}

body{
    background:#0a0f1e;
    color:white;
    padding:20px;
}

.card{
    background:#141b2b;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
}

.timer-display{
    font-size:60px;
    font-family:monospace;
    text-align:center;
    margin:20px 0;
    color:#facc15;
}

.controls{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:40px;
    padding:12px 20px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.btn-primary{ background:#3b82f6; }
.btn-danger{ background:#dc2626; }
.btn-success{ background:#10b981; }

.exercise-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.exercise-item{
    display:flex;
    gap:10px;
    align-items:center;
    background:#1e293b;
    padding:10px;
    border-radius:14px;
}

.exercise-item input{
    flex:1;
    background:#0f172a;
    border:none;
    border-radius:10px;
    padding:10px;
    color:white;
}

.lock-indicator{
    display:none;
    background:#dc2626;
    padding:10px;
    border-radius:12px;
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
}

.lock-indicator.active{
    display:block;
}

/* ========================= */
/* NOVO BLOQUEIO */
/* ========================= */

.locked .exercise-item input,
.locked button,
.locked select,
.locked .config-item input,
.locked .add-exercise input {
    pointer-events: none !important;
    opacity: 0.6;
}

/* libera controles principais */
.locked #pauseBtn,
.locked #resetBtn{
    pointer-events:auto !important;
    opacity:1 !important;
}

.status{
    margin-top:15px;
    text-align:center;
    color:#94a3b8;
}

</style>
</head>

<body>

<div class="lock-indicator" id="lockIndicator">
🔒 TREINO EM ANDAMENTO
</div>

<div class="card">
    <div class="timer-display" id="timerDisplay">00:45</div>

    <div class="controls">
        <button id="startBtn" class="btn-primary">▶ INICIAR</button>
        <button id="pauseBtn">⏸ PAUSAR</button>
        <button id="resetBtn" class="btn-danger">⟳ RESETAR</button>
    </div>

    <div class="status" id="statusMessage">
        edição liberada
    </div>
</div>

<div id="editableCards">

    <div class="card">

        <h2>💪 TREINO</h2>

        <div class="exercise-list" id="exerciseList"></div>

        <div class="controls add-exercise" style="margin-top:15px;">
            <input type="text" id="exerciseName" placeholder="Novo exercício">
            <button class="btn-success" id="addBtn">+ adicionar</button>
        </div>

    </div>

</div>

<script>

let treino = [
    { name:"Supino", seconds:45 },
    { name:"Agachamento", seconds:45 },
    { name:"Remada", seconds:45 }
];

let currentIndex = 0;
let timeLeft = treino[0].seconds;

let timerInterval = null;
let isRunning = false;

const timerDisplay = document.getElementById('timerDisplay');
const exerciseList = document.getElementById('exerciseList');
const editableCards = document.getElementById('editableCards');
const lockIndicator = document.getElementById('lockIndicator');
const statusMessage = document.getElementById('statusMessage');

function formatTime(seconds){
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;

    return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
}

function updateTimer(){
    timerDisplay.textContent = formatTime(timeLeft);
}

function renderExercises(){

    exerciseList.innerHTML = '';

    treino.forEach((ex,index)=>{

        const div = document.createElement('div');
        div.className = 'exercise-item';

        const input = document.createElement('input');
        input.value = ex.name;

        input.addEventListener('change',(e)=>{
            treino[index].name = e.target.value;
        });

        const time = document.createElement('span');
        time.textContent = `${ex.seconds}s`;

        div.appendChild(input);
        div.appendChild(time);

        exerciseList.appendChild(div);

    });

}

function setLockedMode(locked) {

    if (locked && isRunning) {

        editableCards.classList.add('locked');

        lockIndicator.classList.add('active');

        statusMessage.innerHTML =
        '🔒 cronômetro rodando';

    } else {

        editableCards.classList.remove('locked');

        lockIndicator.classList.remove('active');

        statusMessage.innerHTML =
        '✏️ edição liberada';

    }
}

function stopTimer(){

    if(timerInterval){
        clearInterval(timerInterval);
        timerInterval = null;
    }

    isRunning = false;
}

function startActualTimer(){

    stopTimer();

    isRunning = true;

    setLockedMode(true);

    timerInterval = setInterval(()=>{

        if(!isRunning) return;

        if(timeLeft > 0){

            timeLeft--;

            updateTimer();

        }else{

            stopTimer();

            if(currentIndex < treino.length - 1){

                currentIndex++;

                timeLeft = treino[currentIndex].seconds;

                startActualTimer();

            }else{

                statusMessage.innerHTML =
                '🏆 treino finalizado';

                setLockedMode(false);

            }

        }

    },1000);

}

function startTreino(){

    if (!isRunning) {

        // =========================
        // CONTINUA DO PONTO PAUSADO
        // =========================

        if (
            timeLeft > 0 &&
            timeLeft < treino[currentIndex].seconds
        ) {

            startActualTimer();

        } else {

            timeLeft = treino[currentIndex].seconds;

            updateTimer();

            startActualTimer();

        }

    }

}

function pauseTreino(){

    if(isRunning){

        stopTimer();

        setLockedMode(false);

        statusMessage.innerHTML =
        '⏸ pausado — edição liberada';

    }

}

function resetTreino(){

    stopTimer();

    currentIndex = 0;

    timeLeft = treino[0].seconds;

    updateTimer();

    setLockedMode(false);

    statusMessage.innerHTML =
    '🔄 resetado';

}

document.getElementById('startBtn')
.addEventListener('click',startTreino);

document.getElementById('pauseBtn')
.addEventListener('click',pauseTreino);

document.getElementById('resetBtn')
.addEventListener('click',resetTreino);

document.getElementById('addBtn')
.addEventListener('click',()=>{

    if(isRunning) return;

    const input = document.getElementById('exerciseName');

    const name = input.value.trim();

    if(!name) return;

    treino.push({
        name,
        seconds:45
    });

    input.value = '';

    renderExercises();

});

renderExercises();
updateTimer();

</script>

</body>
</html>
