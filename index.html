<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Treino Profissional - Completo</title>

<style>

*{
    box-sizing:border-box;
    font-family:system-ui;
}

body{
    background:#0a0f1e;
    color:white;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#141b2b;
    border-radius:24px;
    padding:20px;
    margin-bottom:20px;
}

.timer-display{
    font-size:72px;
    text-align:center;
    font-family:monospace;
    font-weight:bold;
    color:#facc15;
    margin:20px 0;
}

.total-timer{
    text-align:right;
    font-size:16px;
    color:#60a5fa;
    margin-bottom:10px;
    font-family:monospace;
}

.exercise-name{
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.stage-category{
    text-align:center;
    font-size:14px;
    color:#94a3b8;
    margin-top:5px;
}

.round-info{
    text-align:center;
    font-size:14px;
    color:#60a5fa;
    margin-top:5px;
}

.next-exercise{
    text-align:center;
    font-size:16px;
    color:#facc15;
    margin-top:10px;
    background:#1e293b;
    display:inline-block;
    padding:6px 16px;
    border-radius:40px;
    width:auto;
    margin-left:auto;
    margin-right:auto;
}

.progress{
    height:14px;
    background:#1e293b;
    border-radius:999px;
    overflow:hidden;
    margin-top:20px;
}

.progress-fill{
    height:100%;
    width:100%;
    background:#3b82f6;
    transition:width 1s linear;
}

.controls{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:20px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:999px;
    padding:12px 20px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.btn-primary{ background:#2563eb; }
.btn-danger{ background:#dc2626; }
.btn-success{ background:#10b981; }
.btn-warning{ background:#f59e0b; }

.exercise-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.exercise-item{
    background:#1e293b;
    border-radius:16px;
    padding:12px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.exercise-item.current{
    border:2px solid #facc15;
}

.exercise-item input{
    flex:1;
    min-width:120px;
    background:#0f172a;
    border:none;
    border-radius:12px;
    padding:10px;
    color:white;
}

.time-box{
    display:flex;
    align-items:center;
    gap:6px;
}

.time-box span{
    min-width:55px;
    text-align:center;
    font-weight:bold;
    color:#facc15;
}

.small-btn{
    padding:6px 10px;
    border-radius:10px;
    background:#334155;
    cursor:pointer;
}

.move-buttons{
    display:flex;
    gap:5px;
}

.lock-indicator{
    display:none;
    text-align:center;
    background:#dc2626;
    padding:10px;
    border-radius:12px;
    margin-bottom:15px;
    font-weight:bold;
}

.lock-indicator.active{
    display:block;
}

.status{
    margin-top:15px;
    text-align:center;
    color:#94a3b8;
}

.countdown{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
}

.countdown-number{
    font-size:140px;
    font-weight:bold;
    color:#facc15;
}

.countdown-text{
    font-size:24px;
}

/* trava só edição */
.locked .exercise-item input,
.locked .small-btn,
.locked .move-btn,
.locked .add-exercise input,
.locked .add-exercise button{
    pointer-events:none;
    opacity:.5;
}

.config-bar{
    display:flex;
    gap:15px;
    align-items:center;
    flex-wrap:wrap;
    background:#0f172a;
    padding:15px;
    border-radius:16px;
    margin-bottom:15px;
}

.config-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
}

.config-item input{
    background:#1e293b;
    border:none;
    padding:6px 10px;
    border-radius:40px;
    color:white;
    width:70px;
    text-align:center;
}

.etapa-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

</style>
</head>

<body>

<div class="container">

<div class="lock-indicator" id="lockIndicator">
🔒 TREINO EM ANDAMENTO - EDIÇÃO BLOQUEADA
</div>

<div class="card">

<div class="total-timer" id="totalTimerDisplay">
⏱️ TOTAL: 00:00
</div>

<div class="exercise-name" id="exerciseName">
Carregando...
</div>

<div class="stage-category" id="stageCategory">
🔥 AQUECIMENTO
</div>

<div class="round-info" id="roundInfo">
</div>

<div class="next-exercise" id="nextExercise">
</div>

<div class="timer-display" id="timerDisplay">
00:00
</div>

<div class="progress">
<div class="progress-fill" id="progressFill"></div>
</div>

<div class="controls">
<button class="btn-primary" id="startBtn">▶ INICIAR</button>
<button id="pauseBtn">⏸ PAUSAR</button>
<button class="btn-danger" id="resetBtn">⟳ RESETAR</button>
</div>

<div class="status" id="statusMessage">
✏️ Edição liberada - monte seu treino
</div>

</div>

<div id="editableCards">

<div class="card">
<div class="etapa-title">
<span>⚙️ CONFIGURAÇÕES</span>
</div>
<div class="config-bar">
<div class="config-item">
<label>🔄 Rodadas TREINO:</label>
<input type="number" id="treinoRoundsInput" min="1" max="99" value="3">
</div>
<div class="config-item">
<label>⏱️ Descanso entre rodadas (seg):</label>
<input type="number" id="restBetweenRoundsInput" min="0" max="600" value="60">
</div>
<div class="config-item">
<label>⏸️ Transição AQUECIMENTO→TREINO:</label>
<input type="number" id="restAquecimentoToTreinoInput" min="0" max="300" value="10">
</div>
<div class="config-item">
<label>⏸️ Transição TREINO→DESAQUECIMENTO:</label>
<input type="number" id="restTreinoToDesaquecimentoInput" min="0" max="300" value="10">
</div>
<button id="applyConfigBtn" class="btn-primary">APLICAR</button>
</div>
</div>

<div class="card">
<div class="etapa-title">
<span>🔥 AQUECIMENTO (executa 1 vez)</span>
</div>
<div class="exercise-list" id="aquecimentoList"></div>
<div class="controls add-exercise">
<input type="text" id="newAquecimentoName" placeholder="Novo exercício" value="Polichinelo">
<button class="btn-success" id="addAquecimentoBtn">+ ADICIONAR</button>
</div>
</div>

<div class="card">
<div class="etapa-title">
<span>💪 TREINO (repetições)</span>
</div>
<div class="exercise-list" id="treinoList"></div>
<div class="controls add-exercise">
<input type="text" id="newTreinoName" placeholder="Novo exercício" value="Supino">
<button class="btn-success" id="addTreinoBtn">+ ADICIONAR</button>
</div>
</div>

<div class="card">
<div class="etapa-title">
<span>🧘 DESAQUECIMENTO (executa 1 vez)</span>
</div>
<div class="exercise-list" id="desaquecimentoList"></div>
<div class="controls add-exercise">
<input type="text" id="newDesaquecimentoName" placeholder="Novo exercício" value="Alongamento">
<button class="btn-success" id="addDesaquecimentoBtn">+ ADICIONAR</button>
</div>
</div>

<div class="card">
<div class="etapa-title">
<span>💾 SALVAR / CARREGAR</span>
</div>
<div class="controls save-load" style="justify-content:space-between; flex-wrap:wrap;">
<input type="text" id="treinoNome" placeholder="Nome do treino" style="flex:2; background:#0f172a; border:none; border-radius:40px; padding:12px; color:white;" value="Meu Treino">
<button id="saveTreinoBtn" class="btn-primary">💾 SALVAR</button>
<select id="loadSelect" style="flex:1; background:#0f172a; border:none; border-radius:40px; padding:12px; color:white;">
<option value="">-- Carregar --</option>
</select>
<button id="deleteTreinoBtn" class="btn-danger">🗑 EXCLUIR</button>
</div>
</div>

</div>

</div>

<script>

// ======================================
// DADOS
// ======================================

let aquecimento = [];
let treino = [];
let desaquecimento = [];

let treinoRounds = 3;
let restBetweenRounds = 60;
let restAquecimentoToTreino = 10;
let restTreinoToDesaquecimento = 10;

let fullWorkflow = [];
let currentStepIndex = 0;
let timeLeft = 0;
let timerInterval = null;
let isRunning = false;
let totalTimeSeconds = 0;
let totalTimeLeft = 0;
let hasAnnouncedNext = false;

// ======================================
// DOM
// ======================================

const timerDisplay = document.getElementById('timerDisplay');
const totalTimerDisplay = document.getElementById('totalTimerDisplay');
const exerciseName = document.getElementById('exerciseName');
const stageCategory = document.getElementById('stageCategory');
const roundInfo = document.getElementById('roundInfo');
const nextExerciseSpan = document.getElementById('nextExercise');
const progressFill = document.getElementById('progressFill');
const editableCards = document.getElementById('editableCards');
const statusMessage = document.getElementById('statusMessage');
const lockIndicator = document.getElementById('lockIndicator');

const aquecimentoList = document.getElementById('aquecimentoList');
const treinoList = document.getElementById('treinoList');
const desaquecimentoList = document.getElementById('desaquecimentoList');

const treinoRoundsInput = document.getElementById('treinoRoundsInput');
const restBetweenRoundsInput = document.getElementById('restBetweenRoundsInput');
const restAquecimentoToTreinoInput = document.getElementById('restAquecimentoToTreinoInput');
const restTreinoToDesaquecimentoInput = document.getElementById('restTreinoToDesaquecimentoInput');

const treinoNomeInput = document.getElementById('treinoNome');
const loadSelect = document.getElementById('loadSelect');

// ======================================
// ÁUDIO
// ======================================

let audioActivated = false;

function activateAudio(){
    if(audioActivated) return;
    audioActivated = true;
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    ctx.resume();
    statusMessage.innerHTML = '🔊 áudio ativado - edição liberada';
}
document.body.addEventListener('click', activateAudio, { once: true });

function speak(text){
    if(!audioActivated || !text) return;
    try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'pt-BR';
        utterance.rate = 1;
        window.speechSynthesis.speak(utterance);
    } catch(e) { }
}

function beep(freq=900, duration=.15){
    if(!audioActivated) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
        osc.stop(ctx.currentTime + duration);
        ctx.resume();
    } catch(e) { }
}

// ======================================
// FUNÇÕES AUXILIARES
// ======================================

function formatTime(seconds){
    const mins = Math.floor(Math.abs(seconds) / 60);
    const secs = Math.abs(seconds) % 60;
    return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
}

function formatTimeToText(seconds){
    if(seconds < 60) return `${seconds} segundos`;
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    if(secs === 0) return mins === 1 ? `${mins} minuto` : `${mins} minutos`;
    return `${mins} minuto${mins > 1 ? 's' : ''} e ${secs} segundo${secs > 1 ? 's' : ''}`;
}

function stopTimer(){
    if(timerInterval){
        clearInterval(timerInterval);
        timerInterval = null;
    }
    isRunning = false;
}

function setLockedMode(locked){
    if(locked && isRunning){
        editableCards.classList.add('locked');
        lockIndicator.classList.add('active');
    }else{
        editableCards.classList.remove('locked');
        lockIndicator.classList.remove('active');
    }
}

function updateUINextExercise(){
    // Mostra próximo exercício visualmente
    if(currentStepIndex + 1 < fullWorkflow.length){
        const nextStep = fullWorkflow[currentStepIndex + 1];
        const timeText = formatTimeToText(nextStep.seconds);
        if(nextStep.type === 'rest'){
            nextExerciseSpan.textContent = `⏩ Próximo: DESCANSO, ${timeText}`;
        }else{
            nextExerciseSpan.textContent = `⏩ Próximo: ${nextStep.name}, ${timeText}`;
            if(nextStep.etapa === 'treino') nextExerciseSpan.textContent += ` (rodada ${nextStep.round})`;
        }
    }else{
        nextExerciseSpan.textContent = `⏩ Último!`;
    }
}

function updateUI(){
    if(!fullWorkflow.length || currentStepIndex >= fullWorkflow.length){
        timerDisplay.textContent = formatTime(0);
        exerciseName.textContent = "🏆 FIM!";
        stageCategory.textContent = "PARABÉNS!";
        roundInfo.textContent = "";
        nextExerciseSpan.textContent = "";
        progressFill.style.width = "0%";
        return;
    }
    const step = fullWorkflow[currentStepIndex];
    timerDisplay.textContent = formatTime(timeLeft);
    const totalTime = step.seconds;
    progressFill.style.width = `${(timeLeft / totalTime) * 100}%`;
    exerciseName.textContent = step.name;
    totalTimerDisplay.textContent = `⏱️ TOTAL: ${formatTime(totalTimeLeft)}`;
    
    updateUINextExercise();
    
    if(step.etapa === 'aquecimento'){
        stageCategory.textContent = '🔥 AQUECIMENTO';
        roundInfo.textContent = '';
    }else if(step.etapa === 'treino'){
        stageCategory.textContent = '💪 TREINO';
        roundInfo.textContent = `Rodada ${step.round}/${treinoRounds}`;
    }else if(step.etapa === 'desaquecimento'){
        stageCategory.textContent = '🧘 DESAQUECIMENTO';
        roundInfo.textContent = '';
    }else if(step.type === 'rest'){
        stageCategory.textContent = '⏸️ DESCANSO';
        roundInfo.textContent = '';
    }
    renderAllLists();
}

// ======================================
// AVISO DO PRÓXIMO - FRASE SIMPLES
// ======================================

function announceNextIfNeeded(){
    // Avisa apenas quando faltam 10 segundos e ainda não avisou
    if(timeLeft === 10 && currentStepIndex + 1 < fullWorkflow.length && !hasAnnouncedNext){
        hasAnnouncedNext = true;
        const nextStep = fullWorkflow[currentStepIndex + 1];
        if(nextStep){
            const timeText = formatTimeToText(nextStep.seconds);
            let msg = '';
            if(nextStep.type === 'rest'){
                msg = `Próximo: descanso, ${timeText}`;
            }else{
                msg = `Próximo: ${nextStep.name}, ${timeText}`;
            }
            speak(msg);
            statusMessage.innerHTML = `🔊 ${msg}`;
        }
    }
}

// ======================================
// CONTAGEM APENAS COM BIP
// ======================================

function showCountdown(callback){
    const overlay = document.createElement('div');
    overlay.className = 'countdown';
    const number = document.createElement('div');
    number.className = 'countdown-number';
    const text = document.createElement('div');
    text.className = 'countdown-text';
    overlay.appendChild(number);
    overlay.appendChild(text);
    document.body.appendChild(overlay);
    let count = 3;
    function update(){
        number.textContent = count;
        if(count > 0){
            beep();
        }else{
            number.textContent = 'VAI!';
            beep(1200, .4);
        }
    }
    update();
    const interval = setInterval(()=>{
        count--;
        if(count >= 0){
            update();
        }else{
            clearInterval(interval);
            overlay.remove();
            callback();
        }
    },1000);
}

// ======================================
// GERAR WORKFLOW
// ======================================

function generateWorkflow(){
    const workflow = [];
    
    for(let i=0; i<aquecimento.length; i++){
        workflow.push({
            type: 'exercise',
            etapa: 'aquecimento',
            name: aquecimento[i].name,
            seconds: aquecimento[i].seconds,
            round: null,
            idx: i
        });
    }
    
    if(aquecimento.length > 0 && restAquecimentoToTreino > 0){
        workflow.push({
            type: 'rest',
            etapa: 'transicao',
            name: 'Transição',
            seconds: restAquecimentoToTreino
        });
    }
    
    for(let round=1; round<=treinoRounds; round++){
        for(let i=0; i<treino.length; i++){
            workflow.push({
                type: 'exercise',
                etapa: 'treino',
                name: treino[i].name,
                seconds: treino[i].seconds,
                round: round,
                idx: i
            });
        }
        if(round < treinoRounds && restBetweenRounds > 0){
            workflow.push({
                type: 'rest',
                etapa: 'descanso_entre_series',
                name: 'Descanso',
                seconds: restBetweenRounds,
                round: round
            });
        }
    }
    
    if(treino.length > 0 && restTreinoToDesaquecimento > 0){
        workflow.push({
            type: 'rest',
            etapa: 'transicao',
            name: 'Transição',
            seconds: restTreinoToDesaquecimento
        });
    }
    
    for(let i=0; i<desaquecimento.length; i++){
        workflow.push({
            type: 'exercise',
            etapa: 'desaquecimento',
            name: desaquecimento[i].name,
            seconds: desaquecimento[i].seconds,
            round: null,
            idx: i
        });
    }
    
    return workflow;
}

function rebuildWorkflow(){
    fullWorkflow = generateWorkflow();
    totalTimeSeconds = fullWorkflow.reduce((sum, step) => sum + step.seconds, 0);
    totalTimeLeft = totalTimeSeconds;
    if(currentStepIndex >= fullWorkflow.length){
        currentStepIndex = fullWorkflow.length;
    }
    if(fullWorkflow.length > 0 && currentStepIndex < fullWorkflow.length && timeLeft === 0){
        timeLeft = fullWorkflow[currentStepIndex].seconds;
    }
    updateUI();
}

// ======================================
// TIMER PRINCIPAL
// ======================================

function startActualTimer(){
    if(timerInterval) stopTimer();
    if(currentStepIndex >= fullWorkflow.length) return;
    
    const step = fullWorkflow[currentStepIndex];
    timeLeft = step.seconds;
    hasAnnouncedNext = false;
    updateUI();
    isRunning = true;
    setLockedMode(true);
    
    timerInterval = setInterval(() => {
        if(!isRunning) return;
        
        if(timeLeft > 0){
            timeLeft--;
            totalTimeLeft--;
            updateUI();
            
            // Avisa próximo com 10 segundos de antecedência
            if(timeLeft === 10){
                announceNextIfNeeded();
            }
            
            if(timeLeft === 3) beep();
            if(timeLeft === 2) beep();
            if(timeLeft === 1) beep();
        }
        
        if(timeLeft === 0 && currentStepIndex < fullWorkflow.length){
            stopTimer();
            isRunning = false;
            
            if(currentStepIndex + 1 < fullWorkflow.length){
                currentStepIndex++;
                startActualTimer();
            }else{
                currentStepIndex++;
                updateUI();
                speak("Treino finalizado!");
                statusMessage.innerHTML = "🏆 TREINO FINALIZADO!";
                beep(1200, 0.5);
                setLockedMode(false);
            }
            renderAllLists();
        }
    }, 1000);
}

function startFirstExercise(){
    if(currentStepIndex >= fullWorkflow.length) return;
    
    // Mostra o primeiro exercício visualmente
    updateUI();
    
    showCountdown(() => {
        startActualTimer();
    });
}

function startTreino(){
    if(!aquecimento.length && !treino.length && !desaquecimento.length){
        statusMessage.innerHTML = "❌ Adicione exercícios!";
        return;
    }
    if(currentStepIndex >= fullWorkflow.length) resetTreino();
    if(!isRunning && currentStepIndex < fullWorkflow.length){
        startFirstExercise();
    }
}

function pauseTreino(){
    if(!isRunning) return;
    stopTimer();
    setLockedMode(false);
    window.speechSynthesis.cancel();
    statusMessage.innerHTML = "⏸ Pausado - edição liberada";
}

function resetTreino(){
    if(isRunning){
        if(confirm("Resetar o treino?")){
            stopTimer();
            isRunning = false;
            setLockedMode(false);
            currentStepIndex = 0;
            hasAnnouncedNext = false;
            rebuildWorkflow();
            if(fullWorkflow.length > 0){
                timeLeft = fullWorkflow[0].seconds;
            }
            totalTimeLeft = totalTimeSeconds;
            updateUI();
            statusMessage.innerHTML = "🔄 Resetado - edição liberada";
            speak("Treino resetado");
        }
    }else{
        stopTimer();
        isRunning = false;
        setLockedMode(false);
        currentStepIndex = 0;
        hasAnnouncedNext = false;
        rebuildWorkflow();
        if(fullWorkflow.length > 0){
            timeLeft = fullWorkflow[0].seconds;
        }
        totalTimeLeft = totalTimeSeconds;
        updateUI();
        statusMessage.innerHTML = "🔄 Resetado - edição liberada";
    }
}

function applyConfig(){
    const newRounds = parseInt(treinoRoundsInput.value);
    if(newRounds >= 1 && newRounds <= 99) treinoRounds = newRounds;
    restBetweenRounds = Math.max(0, parseInt(restBetweenRoundsInput.value) || 0);
    restAquecimentoToTreino = Math.max(0, parseInt(restAquecimentoToTreinoInput.value) || 0);
    restTreinoToDesaquecimento = Math.max(0, parseInt(restTreinoToDesaquecimentoInput.value) || 0);
    
    rebuildWorkflow();
    if(!isRunning && fullWorkflow.length > 0 && currentStepIndex < fullWorkflow.length){
        timeLeft = fullWorkflow[currentStepIndex].seconds;
        updateUI();
    }
    totalTimeLeft = totalTimeSeconds;
    updateUI();
    statusMessage.innerHTML = `⚙️ Config aplicada: ${treinoRounds}x treino`;
}

// ======================================
// RENDERIZAR LISTAS
// ======================================

function renderExerciseList(container, exercises, listType){
    if(!container) return;
    container.innerHTML = '';
    if(exercises.length === 0){
        container.innerHTML = '<div style="text-align:center; padding:20px; color:#94a3b8;">➕ Clique em ADICIONAR</div>';
        return;
    }
    
    exercises.forEach((ex, idx) => {
        const div = document.createElement('div');
        div.className = 'exercise-item';
        
        let isCurrent = false;
        for(let i=0; i<fullWorkflow.length; i++){
            const step = fullWorkflow[i];
            if(step.etapa === listType && step.idx === idx){
                if(i === currentStepIndex) isCurrent = true;
                break;
            }
        }
        if(isCurrent) div.classList.add('current');
        
        const input = document.createElement('input');
        input.value = ex.name;
        input.onchange = (e) => {
            exercises[idx].name = e.target.value;
            rebuildWorkflow();
        };
        
        const timeBox = document.createElement('div');
        timeBox.className = 'time-box';
        
        const minus = document.createElement('button');
        minus.className = 'small-btn';
        minus.textContent = '-5';
        minus.onclick = () => {
            exercises[idx].seconds = Math.max(5, exercises[idx].seconds - 5);
            if(!isRunning && fullWorkflow.length > 0 && currentStepIndex < fullWorkflow.length){
                const step = fullWorkflow[currentStepIndex];
                if(step.etapa === listType && step.idx === idx){
                    timeLeft = exercises[idx].seconds;
                }
            }
            rebuildWorkflow();
        };
        
        const span = document.createElement('span');
        span.textContent = `${ex.seconds}s`;
        
        const plus = document.createElement('button');
        plus.className = 'small-btn';
        plus.textContent = '+5';
        plus.onclick = () => {
            exercises[idx].seconds += 5;
            if(!isRunning && fullWorkflow.length > 0 && currentStepIndex < fullWorkflow.length){
                const step = fullWorkflow[currentStepIndex];
                if(step.etapa === listType && step.idx === idx){
                    timeLeft = exercises[idx].seconds;
                }
            }
            rebuildWorkflow();
        };
        
        timeBox.appendChild(minus);
        timeBox.appendChild(span);
        timeBox.appendChild(plus);
        
        const moveDiv = document.createElement('div');
        moveDiv.className = 'move-buttons';
        
        const up = document.createElement('button');
        up.className = 'small-btn move-btn';
        up.textContent = '▲';
        up.disabled = idx === 0;
        up.onclick = () => {
            [exercises[idx-1], exercises[idx]] = [exercises[idx], exercises[idx-1]];
            rebuildWorkflow();
        };
        
        const down = document.createElement('button');
        down.className = 'small-btn move-btn';
        down.textContent = '▼';
        down.disabled = idx === exercises.length - 1;
        down.onclick = () => {
            [exercises[idx+1], exercises[idx]] = [exercises[idx], exercises[idx+1]];
            rebuildWorkflow();
        };
        
        moveDiv.appendChild(up);
        moveDiv.appendChild(down);
        
        const del = document.createElement('button');
        del.className = 'btn-danger';
        del.textContent = '🗑';
        del.onclick = () => {
            exercises.splice(idx, 1);
            rebuildWorkflow();
        };
        
        div.appendChild(input);
        div.appendChild(timeBox);
        div.appendChild(moveDiv);
        div.appendChild(del);
        container.appendChild(div);
    });
}

function renderAllLists(){
    renderExerciseList(aquecimentoList, aquecimento, 'aquecimento');
    renderExerciseList(treinoList, treino, 'treino');
    renderExerciseList(desaquecimentoList, desaquecimento, 'desaquecimento');
}

// ======================================
// SALVAR / CARREGAR
// ======================================

function salvarTreino(){
    const nome = treinoNomeInput.value.trim();
    if(!nome){ alert("Digite um nome"); return; }
    const data = {
        aquecimento, treino, desaquecimento,
        treinoRounds, restBetweenRounds,
        restAquecimentoToTreino, restTreinoToDesaquecimento
    };
    const salvos = JSON.parse(localStorage.getItem('treinoProfissional') || '{}');
    salvos[nome] = data;
    localStorage.setItem('treinoProfissional', JSON.stringify(salvos));
    atualizarSelect();
    statusMessage.innerHTML = `💾 "${nome}" salvo!`;
}

function carregarTreino(nome){
    const salvos = JSON.parse(localStorage.getItem('treinoProfissional') || '{}');
    const data = salvos[nome];
    if(data){
        aquecimento = data.aquecimento || [];
        treino = data.treino || [];
        desaquecimento = data.desaquecimento || [];
        treinoRounds = data.treinoRounds || 3;
        restBetweenRounds = data.restBetweenRounds || 60;
        restAquecimentoToTreino = data.restAquecimentoToTreino || 10;
        restTreinoToDesaquecimento = data.restTreinoToDesaquecimento || 10;
        
        treinoRoundsInput.value = treinoRounds;
        restBetweenRoundsInput.value = restBetweenRounds;
        restAquecimentoToTreinoInput.value = restAquecimentoToTreino;
        restTreinoToDesaquecimentoInput.value = restTreinoToDesaquecimento;
        
        stopTimer();
        isRunning = false;
        setLockedMode(false);
        currentStepIndex = 0;
        hasAnnouncedNext = false;
        rebuildWorkflow();
        if(fullWorkflow.length > 0){
            timeLeft = fullWorkflow[0].seconds;
        }
        totalTimeLeft = totalTimeSeconds;
        updateUI();
        statusMessage.innerHTML = `📂 "${nome}" carregado!`;
    }else{
        alert("Treino não encontrado");
    }
}

function deletarTreino(){
    const nome = loadSelect.value;
    if(!nome){ alert("Selecione um treino"); return; }
    if(confirm(`Excluir "${nome}"?`)){
        const salvos = JSON.parse(localStorage.getItem('treinoProfissional') || '{}');
        delete salvos[nome];
        localStorage.setItem('treinoProfissional', JSON.stringify(salvos));
        atualizarSelect();
        statusMessage.innerHTML = `🗑️ "${nome}" excluído`;
    }
}

function atualizarSelect(){
    const salvos = JSON.parse(localStorage.getItem('treinoProfissional') || '{}');
    loadSelect.innerHTML = '<option value="">-- Carregar --</option>';
    for(let nome in salvos){
        const opt = document.createElement('option');
        opt.value = nome;
        opt.textContent = nome;
        loadSelect.appendChild(opt);
    }
}

document.getElementById('startBtn').onclick = startTreino;
document.getElementById('pauseBtn').onclick = pauseTreino;

document.getElementById('saveTreinoBtn').onclick = salvarTreino;
document.getElementById('deleteTreinoBtn').onclick = deletarTreino;
loadSelect.onchange = (e) => { if(e.target.value) carregarTreino(e.target.value); };

}
