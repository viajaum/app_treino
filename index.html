<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Treino Profissional - Carregar JSON</title>

<style>

*{
    box-sizing:border-box;
    font-family:system-ui;
}

body{
    background:#0a0f1e;
    color:white;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#141b2b;
    border-radius:24px;
    padding:20px;
    margin-bottom:20px;
}

.timer-display{
    font-size:72px;
    text-align:center;
    font-family:monospace;
    font-weight:bold;
    color:#facc15;
    margin:20px 0;
}

.total-timer{
    text-align:right;
    font-size:16px;
    color:#60a5fa;
    margin-bottom:10px;
    font-family:monospace;
}

.exercise-name{
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.stage-category{
    text-align:center;
    font-size:14px;
    color:#94a3b8;
    margin-top:5px;
}

.round-info{
    text-align:center;
    font-size:14px;
    color:#60a5fa;
    margin-top:5px;
}

.next-exercise{
    text-align:center;
    font-size:16px;
    color:#facc15;
    margin-top:10px;
    background:#1e293b;
    display:inline-block;
    padding:6px 16px;
    border-radius:40px;
    width:auto;
    margin-left:auto;
    margin-right:auto;
}

.progress{
    height:14px;
    background:#1e293b;
    border-radius:999px;
    overflow:hidden;
    margin-top:20px;
}

.progress-fill{
    height:100%;
    width:100%;
    background:#3b82f6;
    transition:width 1s linear;
}

.controls{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:20px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:999px;
    padding:12px 20px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.btn-primary{ background:#2563eb; }
.btn-danger{ background:#dc2626; }
.btn-success{ background:#10b981; }
.btn-warning{ background:#f59e0b; }

.lock-indicator{
    display:none;
    text-align:center;
    background:#dc2626;
    padding:10px;
    border-radius:12px;
    margin-bottom:15px;
    font-weight:bold;
}

.lock-indicator.active{
    display:block;
}

.status{
    margin-top:15px;
    text-align:center;
    color:#94a3b8;
}

.countdown{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
}

.countdown-number{
    font-size:140px;
    font-weight:bold;
    color:#facc15;
}

.countdown-text{
    font-size:24px;
}

.import-json{
    background:#0f172a;
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
    text-align:center;
}

.file-input-label{
    background:#3b82f6;
    padding:12px 24px;
    border-radius:40px;
    cursor:pointer;
    display:inline-block;
    font-weight:bold;
}

.file-info{
    margin-top:10px;
    font-size:12px;
    color:#94a3b8;
}

</style>
</head>

<body>

<div class="container">

<div class="lock-indicator" id="lockIndicator">
🔒 TREINO EM ANDAMENTO
</div>

<div class="card">

<div class="total-timer" id="totalTimerDisplay">
⏱️ TOTAL: 00:00
</div>

<div class="exercise-name" id="exerciseName">
Carregue um treino
</div>

<div class="stage-category" id="stageCategory">
</div>

<div class="round-info" id="roundInfo">
</div>

<div class="next-exercise" id="nextExercise">
</div>

<div class="timer-display" id="timerDisplay">
00:00
</div>

<div class="progress">
<div class="progress-fill" id="progressFill"></div>
</div>

<div class="controls">
<button class="btn-primary" id="startBtn">▶ INICIAR</button>
<button id="pauseBtn">⏸ PAUSAR</button>
<button class="btn-danger" id="resetBtn">⟳ RESETAR</button>
</div>

<div class="status" id="statusMessage">
📁 Selecione um arquivo JSON para começar
</div>

</div>

<div class="import-json">
<div style="font-size:18px; font-weight:bold; margin-bottom:15px;">📁 CARREGAR TREINO</div>
<input type="file" id="jsonFileInput" accept=".json" style="display:none;">
<button id="importJsonBtn" class="btn-primary" style="font-size:18px; padding:15px 30px;">📂 SELECIONAR ARQUIVO JSON</button>
<div class="file-info">
Exemplo de arquivo: treino.json com { "aquecimento": [{"nome":"Polichinelo","segundos":60}] }
</div>
</div>

</div>

<script>

// ======================================
// DADOS
// ======================================

let aquecimento = [];
let treino = [];
let desaquecimento = [];

let treinoRounds = 1;
let restBetweenRounds = 0;
let restAquecimentoToTreino = 5;
let restTreinoToDesaquecimento = 5;

let fullWorkflow = [];
let currentStepIndex = 0;
let timeLeft = 0;
let timerInterval = null;
let isRunning = false;
let totalTimeSeconds = 0;
let totalTimeLeft = 0;
let hasAnnouncedNext = false;
let treinoCarregado = false;

// ======================================
// DOM
// ======================================

const timerDisplay = document.getElementById('timerDisplay');
const totalTimerDisplay = document.getElementById('totalTimerDisplay');
const exerciseName = document.getElementById('exerciseName');
const stageCategory = document.getElementById('stageCategory');
const roundInfo = document.getElementById('roundInfo');
const nextExerciseSpan = document.getElementById('nextExercise');
const progressFill = document.getElementById('progressFill');
const statusMessage = document.getElementById('statusMessage');
const lockIndicator = document.getElementById('lockIndicator');

// ======================================
// ÁUDIO
// ======================================

let audioActivated = false;

function activateAudio(){
    if(audioActivated) return;
    audioActivated = true;
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    ctx.resume();
    statusMessage.innerHTML = '🔊 áudio ativado';
}
document.body.addEventListener('click', activateAudio, { once: true });

function speak(text){
    if(!audioActivated || !text) return;
    try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'pt-BR';
        utterance.rate = 1;
        window.speechSynthesis.speak(utterance);
    } catch(e) { }
}

function beep(freq=900, duration=.15){
    if(!audioActivated) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
        osc.stop(ctx.currentTime + duration);
        ctx.resume();
    } catch(e) { }
}

// ======================================
// FUNÇÕES AUXILIARES
// ======================================

function formatTime(seconds){
    const mins = Math.floor(Math.abs(seconds) / 60);
    const secs = Math.abs(seconds) % 60;
    return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
}

function formatTimeToText(seconds){
    if(seconds < 60) return `${seconds} segundos`;
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    if(secs === 0) return mins === 1 ? `${mins} minuto` : `${mins} minutos`;
    return `${mins} minuto${mins > 1 ? 's' : ''} e ${secs} segundo${secs > 1 ? 's' : ''}`;
}

function stopTimer(){
    if(timerInterval){
        clearInterval(timerInterval);
        timerInterval = null;
    }
    isRunning = false;
}

function setLockedMode(locked){
    if(locked && isRunning){
        lockIndicator.classList.add('active');
    }else{
        lockIndicator.classList.remove('active');
    }
}

function updateUINextExercise(){
    if(currentStepIndex + 1 < fullWorkflow.length){
        const nextStep = fullWorkflow[currentStepIndex + 1];
        const timeText = formatTimeToText(nextStep.seconds);
        if(nextStep.type === 'rest'){
            nextExerciseSpan.textContent = `⏩ Próximo: DESCANSO, ${timeText}`;
        }else{
            nextExerciseSpan.textContent = `⏩ Próximo: ${nextStep.name}, ${timeText}`;
            if(nextStep.etapa === 'treino') nextExerciseSpan.textContent += ` (rodada ${nextStep.round})`;
        }
    }else{
        nextExerciseSpan.textContent = `⏩ Último!`;
    }
}

function updateUI(){
    if(!fullWorkflow.length || currentStepIndex >= fullWorkflow.length){
        timerDisplay.textContent = formatTime(0);
        exerciseName.textContent = treinoCarregado ? "🏆 FIM!" : "Carregue um treino";
        stageCategory.textContent = "";
        roundInfo.textContent = "";
        nextExerciseSpan.textContent = "";
        progressFill.style.width = "0%";
        return;
    }
    const step = fullWorkflow[currentStepIndex];
    timerDisplay.textContent = formatTime(timeLeft);
    const totalTime = step.seconds;
    progressFill.style.width = `${(timeLeft / totalTime) * 100}%`;
    exerciseName.textContent = step.name;
    totalTimerDisplay.textContent = `⏱️ TOTAL: ${formatTime(totalTimeLeft)}`;
    
    updateUINextExercise();
    
    if(step.etapa === 'aquecimento'){
        stageCategory.textContent = '🔥 AQUECIMENTO';
        roundInfo.textContent = '';
    }else if(step.etapa === 'treino'){
        stageCategory.textContent = '💪 TREINO';
        roundInfo.textContent = `Rodada ${step.round}/${treinoRounds}`;
    }else if(step.etapa === 'desaquecimento'){
        stageCategory.textContent = '🧘 DESAQUECIMENTO';
        roundInfo.textContent = '';
    }else if(step.type === 'rest'){
        stageCategory.textContent = '⏸️ DESCANSO';
        roundInfo.textContent = '';
    }
}

function announceNextIfNeeded(){
    if(timeLeft === 10 && currentStepIndex + 1 < fullWorkflow.length && !hasAnnouncedNext){
        hasAnnouncedNext = true;
        const nextStep = fullWorkflow[currentStepIndex + 1];
        if(nextStep){
            const timeText = formatTimeToText(nextStep.seconds);
            let msg = '';
            if(nextStep.type === 'rest'){
                msg = `Próximo: descanso, ${timeText}`;
            }else{
                msg = `Próximo: ${nextStep.name}, ${timeText}`;
            }
            speak(msg);
            statusMessage.innerHTML = `🔊 ${msg}`;
        }
    }
}

function showCountdown(callback){
    const overlay = document.createElement('div');
    overlay.className = 'countdown';
    const number = document.createElement('div');
    number.className = 'countdown-number';
    const text = document.createElement('div');
    text.className = 'countdown-text';
    overlay.appendChild(number);
    overlay.appendChild(text);
    document.body.appendChild(overlay);
    let count = 3;
    function update(){
        number.textContent = count;
        if(count > 0){
            beep();
        }else{
            number.textContent = 'VAI!';
            beep(1200, .4);
        }
    }
    update();
    const interval = setInterval(()=>{
        count--;
        if(count >= 0){
            update();
        }else{
            clearInterval(interval);
            overlay.remove();
            callback();
        }
    },1000);
}

// ======================================
// GERAR WORKFLOW
// ======================================

function generateWorkflow(){
    const workflow = [];
    
    for(let i=0; i<aquecimento.length; i++){
        workflow.push({
            type: 'exercise',
            etapa: 'aquecimento',
            name: aquecimento[i].name,
            seconds: aquecimento[i].seconds,
            round: null,
            idx: i
        });
    }
    
    if(aquecimento.length > 0 && restAquecimentoToTreino > 0){
        workflow.push({
            type: 'rest',
            etapa: 'transicao',
            name: 'Transição',
            seconds: restAquecimentoToTreino
        });
    }
    
    for(let round=1; round<=treinoRounds; round++){
        for(let i=0; i<treino.length; i++){
            workflow.push({
                type: 'exercise',
                etapa: 'treino',
                name: treino[i].name,
                seconds: treino[i].seconds,
                round: round,
                idx: i
            });
        }
        if(round < treinoRounds && restBetweenRounds > 0){
            workflow.push({
                type: 'rest',
                etapa: 'descanso_entre_series',
                name: 'Descanso',
                seconds: restBetweenRounds,
                round: round
            });
        }
    }
    
    if(treino.length > 0 && restTreinoToDesaquecimento > 0){
        workflow.push({
            type: 'rest',
            etapa: 'transicao',
            name: 'Transição',
            seconds: restTreinoToDesaquecimento
        });
    }
    
    for(let i=0; i<desaquecimento.length; i++){
        workflow.push({
            type: 'exercise',
            etapa: 'desaquecimento',
            name: desaquecimento[i].name,
            seconds: desaquecimento[i].seconds,
            round: null,
            idx: i
        });
    }
    
    return workflow;
}

function rebuildWorkflow(){
    fullWorkflow = generateWorkflow();
    totalTimeSeconds = fullWorkflow.reduce((sum, step) => sum + step.seconds, 0);
    totalTimeLeft = totalTimeSeconds;
    if(currentStepIndex >= fullWorkflow.length){
        currentStepIndex = fullWorkflow.length;
    }
    if(fullWorkflow.length > 0 && currentStepIndex < fullWorkflow.length && timeLeft === 0){
        timeLeft = fullWorkflow[currentStepIndex].seconds;
    }
    updateUI();
}

// ======================================
// TIMER PRINCIPAL
// ======================================

function startActualTimer(){
    if(timerInterval) stopTimer();
    if(currentStepIndex >= fullWorkflow.length) return;
    
    const step = fullWorkflow[currentStepIndex];
    timeLeft = step.seconds;
    hasAnnouncedNext = false;
    updateUI();
    isRunning = true;
    setLockedMode(true);
    
    timerInterval = setInterval(() => {
        if(!isRunning) return;
        
        if(timeLeft > 0){
            timeLeft--;
            totalTimeLeft--;
            updateUI();
            
            if(timeLeft === 10){
                announceNextIfNeeded();
            }
            
            if(timeLeft === 3) beep();
            if(timeLeft === 2) beep();
            if(timeLeft === 1) beep();
        }
        
        if(timeLeft === 0 && currentStepIndex < fullWorkflow.length){
            stopTimer();
            isRunning = false;
            
            if(currentStepIndex + 1 < fullWorkflow.length){
                currentStepIndex++;
                startActualTimer();
            }else{
                currentStepIndex++;
                updateUI();
                speak("Treino finalizado!");
                statusMessage.innerHTML = "🏆 TREINO FINALIZADO!";
                beep(1200, 0.5);
                setLockedMode(false);
            }
        }
    }, 1000);
}

function startFirstExercise(){
    if(currentStepIndex >= fullWorkflow.length) return;
    updateUI();
    showCountdown(() => {
        startActualTimer();
    });
}

function startTreino(){
    if(!treinoCarregado){
        statusMessage.innerHTML = "❌ Carregue um arquivo JSON primeiro!";
        return;
    }
    if(currentStepIndex >= fullWorkflow.length) resetTreino();
    if(!isRunning && currentStepIndex < fullWorkflow.length){
        startFirstExercise();
    }
}

function pauseTreino(){
    if(!isRunning) return;
    stopTimer();
    setLockedMode(false);
    window.speechSynthesis.cancel();
    statusMessage.innerHTML = "⏸ Pausado";
}

function resetTreino(){
    if(!treinoCarregado) return;
    if(isRunning){
        stopTimer();
        isRunning = false;
        setLockedMode(false);
        currentStepIndex = 0;
        hasAnnouncedNext = false;
        if(fullWorkflow.length > 0){
            timeLeft = fullWorkflow[0].seconds;
        }
        totalTimeLeft = totalTimeSeconds;
        updateUI();
        statusMessage.innerHTML = "🔄 Resetado";
        speak("Treino resetado");
    }else{
        stopTimer();
        isRunning = false;
        setLockedMode(false);
        currentStepIndex = 0;
        hasAnnouncedNext = false;
        if(fullWorkflow.length > 0){
            timeLeft = fullWorkflow[0].seconds;
        }
        totalTimeLeft = totalTimeSeconds;
        updateUI();
        statusMessage.innerHTML = "🔄 Resetado";
    }
}

// ======================================
// IMPORTAÇÃO JSON
// ======================================

function importFromJSON(jsonData){
    try {
        const data = JSON.parse(jsonData);
        
        aquecimento = [];
        treino = [];
        desaquecimento = [];
        
        if(data.aquecimento) aquecimento = data.aquecimento.map(ex => ({
            name: ex.nome || ex.name,
            seconds: ex.segundos || ex.seconds
        }));
        
        if(data.treino) treino = data.treino.map(ex => ({
            name: ex.nome || ex.name,
            seconds: ex.segundos || ex.seconds
        }));
        
        if(data.desaquecimento) desaquecimento = data.desaquecimento.map(ex => ({
            name: ex.nome || ex.name,
            seconds: ex.segundos || ex.seconds
        }));
        
        if(data.config){
            if(data.config.rodadas) treinoRounds = data.config.rodadas;
            if(data.config.descanso_entre_rodadas) restBetweenRounds = data.config.descanso_entre_rodadas;
            if(data.config.transicao_aquecimento_treino) restAquecimentoToTreino = data.config.transicao_aquecimento_treino;
            if(data.config.transicao_treino_desaquecimento) restTreinoToDesaquecimento = data.config.transicao_treino_desaquecimento;
        }
        
        treinoCarregado = true;
        rebuildWorkflow();
        
        if(fullWorkflow.length > 0){
            currentStepIndex = 0;
            timeLeft = fullWorkflow[0].seconds;
        }
        totalTimeLeft = totalTimeSeconds;
        updateUI();
        
        let nomeTreino = data.nome || "Treino";
        statusMessage.innerHTML = `✅ "${nomeTreino}" carregado! ${fullWorkflow.length} blocos. Clique INICIAR.`;
        speak(`${nomeTreino} carregado`);
        
    } catch(e) {
        alert("Erro ao importar JSON: " + e.message);
    }
}

// ======================================
// EVENTOS
// ======================================

document.getElementById('importJsonBtn').onclick = () => {
    document.getElementById('jsonFileInput').click();
};

document.getElementById('jsonFileInput').onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        importFromJSON(event.target.result);
    };
    reader.readAsText(file);
    e.target.value = '';
};

document.getElementById('startBtn').onclick = startTreino;
document.getElementById('pauseBtn').onclick = pauseTreino;
document.getElementById('resetBtn').onclick = resetTreino;

// ======================================
// INIT
// ======================================

updateUI();

</script>

</body>
</html>
